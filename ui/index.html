<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Leave Eligibility Engine</title>
<style>
  :root {
    --navy: #123152;
    --navy-2: #1a3f68;
    --navy-active: #1f4c7d;
    --bg: #f4f6f9;
    --panel: #ffffff;
    --border: #e3e8ef;
    --text: #16324f;
    --text-dim: #6b7a8d;
    --accent: #2f6fed;
    --accent-bg: #eaf2fd;
    --green: #1a9c63;
    --green-bg: #e5f7ee;
    --red: #d64545;
    --red-bg: #fdecea;
    --amber: #b9791b;
    --amber-bg: #fdf3e2;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
  }
  .app { display: flex; height: 100vh; }

  /* ---- outer icon sidebar ---- */
  .sidebar {
    width: 84px;
    background: var(--navy);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px 0;
    flex-shrink: 0;
  }
  .sidebar .logo {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: #ffffff;
    color: var(--navy);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 15px;
    margin-bottom: 22px;
  }
  .nav-item {
    width: 100%;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 11px 4px;
    color: #9fb3cc;
    cursor: pointer;
    font-size: 11px;
    border-left: 3px solid transparent;
  }
  .nav-item svg { width: 20px; height: 20px; }
  .nav-item:hover { color: #ffffff; }
  .nav-item.active {
    color: #ffffff;
    background: var(--navy-active);
    border-left: 3px solid #ffffff;
  }
  /* ---- inner sub-nav ---- */
  .subnav {
    width: 230px;
    background: #fafbfd;
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .subnav h2 { font-size: 15px; margin: 0 0 16px; color: var(--navy); }
  .subnav .group { margin-bottom: 6px; }
  .subnav .group-head {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 10px;
    border-radius: 7px;
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
    color: var(--text);
  }
  .subnav .group-head:hover { background: #eef1f6; }
  .subnav .group-head .chev { transition: transform .15s; color: var(--text-dim); font-size: 11px; }
  .subnav .group.open .group-head .chev { transform: rotate(90deg); }
  .subnav .group-body { display: none; padding-left: 10px; }
  .subnav .group.open .group-body { display: block; }
  .subnav .pack-item {
    padding: 7px 10px;
    border-radius: 6px;
    font-size: 12.5px;
    color: var(--text-dim);
    cursor: pointer;
  }
  .subnav .pack-item:hover { background: var(--accent-bg); color: var(--accent); }
  .subnav .pack-item.active { background: var(--accent-bg); color: var(--accent); font-weight: 600; }

  /* ---- main content ---- */
  .content { flex: 1; overflow-y: auto; }
  .topbar {
    padding: 20px 30px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
  }
  .topbar .crumb { font-size: 12px; color: var(--text-dim); margin-bottom: 3px; }
  .topbar h1 { font-size: 19px; margin: 0; color: var(--navy); }
  .btn {
    border-radius: 7px;
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: #ffffff;
    color: var(--text);
  }
  .btn:hover { background: #f2f4f8; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: #2560d6; }
  .btn:disabled { opacity: .55; cursor: default; }
  .btn.small { padding: 6px 11px; font-size: 12px; }

  .page { padding: 24px 30px 60px; max-width: 1180px; }

  /* ---- cards ---- */
  .cards-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 22px; }
  .stat-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    min-width: 140px;
  }
  .stat-card .num { font-size: 24px; font-weight: 700; color: var(--navy); }
  .stat-card .label { font-size: 11.5px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .04em; margin-top: 3px; }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 22px;
    margin-bottom: 18px;
  }
  .card.highlight { background: var(--accent-bg); border-color: #d3e4fb; }
  .card-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px;
  }
  .card h3 { margin: 0; font-size: 15px; color: var(--navy); }
  .card .desc { color: var(--text-dim); font-size: 12.5px; margin: 4px 0 14px; }

  /* ---- pills / badges ---- */
  .pill { display: inline-block; padding: 3px 11px; border-radius: 20px; font-size: 11.5px; font-weight: 700; }
  .pill.approved { background: var(--green-bg); color: var(--green); }
  .pill.review { background: var(--red-bg); color: var(--red); }
  .badge-pass { color: var(--green); font-weight: 700; }
  .badge-fail { color: var(--red); font-weight: 700; }
  .badge-pending { color: var(--amber); font-weight: 700; }

  /* ---- evaluate view: input tabs ---- */
  .tabs { display: flex; gap: 4px; margin-bottom: 14px; }
  .tab {
    padding: 8px 14px; font-size: 12.5px; font-weight: 600; cursor: pointer;
    border-radius: 7px; color: var(--text-dim);
  }
  .tab.active { background: var(--accent-bg); color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  textarea {
    width: 100%; min-height: 220px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12.5px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    background: #fbfcfe;
    color: var(--text);
    resize: vertical;
  }
  select, input[type=text] {
    background: #fff;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 12.5px;
  }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
  .file-drop {
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    padding: 30px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
  }
  .file-drop input { display: block; margin: 10px auto 0; }
  .file-list { margin-top: 12px; font-size: 12.5px; color: var(--text-dim); }
  .file-list .f { padding: 4px 0; }

  #evalError {
    display: none;
    background: var(--red-bg); color: var(--red);
    border-radius: 8px; padding: 10px 14px; font-size: 12.5px; margin-bottom: 14px;
  }

  /* ---- result cards ---- */
  .result-card { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 16px; overflow: hidden; }
  .result-head {
    padding: 14px 18px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
    background: #fbfcfe;
    border-bottom: 1px solid var(--border);
  }
  .result-head .titles { display: flex; flex-direction: column; gap: 2px; }
  .result-head .cid { font-weight: 700; font-size: 14px; color: var(--navy); }
  .result-head .cmeta { font-size: 12px; color: var(--text-dim); }
  .result-body { padding: 16px 18px; }
  .reasoning { list-style: none; margin: 0 0 16px; padding: 0; }
  .reasoning li {
    padding: 8px 12px; border-radius: 7px; margin-bottom: 6px; font-size: 13px;
    background: #f7f9fc;
  }
  .reasoning li.ok { background: var(--green-bg); color: #106e46; }
  .reasoning li.bad { background: var(--red-bg); color: #a02e2e; }
  .reasoning li.pending { background: var(--amber-bg); color: #8a5b12; }

  .track { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; }
  .track-head {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px; background: #fafbfd; cursor: pointer; font-weight: 600; font-size: 13px;
  }
  .track-body { display: none; padding: 6px 14px 12px; }
  .track.open .track-body { display: block; }

  .part-block { border-top: 1px solid var(--border); padding: 10px 0; }
  .part-block:first-child { border-top: none; }
  .part-title {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12.5px; font-weight: 700; text-transform: capitalize; color: var(--text);
    margin-bottom: 6px;
  }
  table.cond-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  table.cond-table th {
    text-align: left; color: var(--text-dim); font-weight: 600; padding: 4px 8px 4px 0;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase; font-size: 10.5px; letter-spacing: .03em;
  }
  table.cond-table td { padding: 5px 8px 5px 0; vertical-align: top; border-bottom: 1px solid #f0f2f6; }
  table.cond-table td.result { text-align: right; white-space: nowrap; }

  /* ---- rules tree ---- */
  .rule-meta { font-size: 12px; color: var(--text-dim); margin-bottom: 14px; }
  .rule-node { margin-bottom: 6px; }
  .rule-node-head {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 700; color: var(--navy);
    padding: 6px 0;
  }
  .rule-op {
    font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
    background: var(--accent-bg); color: var(--accent);
  }
  .rule-leaf {
    display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap;
    padding: 6px 10px; border-left: 2px solid var(--border); margin: 2px 0 2px 6px;
    font-size: 12.5px;
  }
  .rule-name { font-weight: 600; color: var(--text); }
  .rule-expr { color: var(--accent); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
  .rule-cite { color: var(--text-dim); font-size: 11px; margin-left: auto; }

  .chunk-panel { display: none; margin: 8px 0 4px; }
  .chunk-panel.open { display: block; }
  .chunk-block { background: #f7f9fc; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
  .chunk-block .chunk-cite { font-size: 11px; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
  .chunk-block pre { white-space: pre-wrap; font-family: inherit; font-size: 12.5px; margin: 0; color: var(--text); }
  .source-btn {
    border: 1px solid var(--border); background: #fff; color: var(--text-dim); cursor: pointer;
    padding: 3px 9px; font-size: 10.5px; border-radius: 6px; font-weight: 600;
  }
  .source-btn:hover { background: var(--accent-bg); color: var(--accent); border-color: #d3e4fb; }

  .empty-state { color: var(--text-dim); padding: 40px; text-align: center; }

  /* ---- modal (rule / source text popup) ---- */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(10,20,35,0.55);
    display: none; align-items: center; justify-content: center; z-index: 1000; padding: 24px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: #fff; border-radius: 12px; max-width: 720px; width: 100%; max-height: 82vh;
    overflow-y: auto; padding: 26px 28px; position: relative;
  }
  .modal-box .modal-close {
    position: absolute; top: 14px; right: 16px; border: none; background: none; font-size: 20px;
    color: var(--text-dim); cursor: pointer; line-height: 1;
  }
  .modal-box .modal-close:hover { color: var(--text); }
  .modal-box h3 { margin: 0 0 4px; color: var(--navy); font-size: 16px; padding-right: 24px; }
  .modal-box .modal-meta { font-size: 12px; color: var(--text-dim); margin-bottom: 14px; }
  .modal-box .section-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-dim);
    font-weight: 700; margin: 16px 0 8px;
  }

  /* ---- specialist manual review ---- */
  .review-box { margin-top: 14px; padding: 14px 16px; border: 1px dashed #d3d9e2; border-radius: 8px; background: #fafbfd; }
  .review-head { font-size: 11px; font-weight: 700; color: var(--navy); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .03em; }
  .review-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .review-actions input[type=text] { flex: 1; min-width: 200px; }
  .btn.review-approve { background: var(--green-bg); color: var(--green); border-color: #bfe8d2; }
  .btn.review-approve:hover { background: #d5f2e3; }
  .btn.review-deny { background: var(--red-bg); color: var(--red); border-color: #f3c6c6; }
  .btn.review-deny:hover { background: #fbdada; }
  .review-result { padding: 4px 2px; font-size: 13px; }
  .review-result.ok { color: #106e46; }
  .review-result.bad { color: #a02e2e; }

  /* ---- failing condition highlight ---- */
  tr.cond-fail-row { background: #fdf2f2; }
  tr.cond-fail-row td:first-child { border-left: 3px solid var(--red); }

  /* ---- editable claim table ---- */
  table.claim-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.claim-table th {
    text-align: left; color: var(--text-dim); font-weight: 600; padding: 6px 8px;
    border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: .03em;
  }
  table.claim-table td { padding: 4px 8px; border-bottom: 1px solid #f0f2f6; vertical-align: middle; }
  table.claim-table input[type=text] { width: 100%; padding: 6px 8px; }
  table.claim-table .rm-btn {
    border: none; background: none; color: var(--text-dim); cursor: pointer; font-size: 15px; line-height: 1;
    padding: 2px 6px; border-radius: 5px;
  }
  table.claim-table .rm-btn:hover { background: var(--red-bg); color: var(--red); }
  .add-fact-row { display: flex; gap: 8px; margin-top: 10px; }
  .add-fact-row input[type=text] { flex: 1; }
  .template-links { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .template-links a {
    font-size: 12px; color: var(--accent); text-decoration: none; padding: 6px 12px;
    border: 1px solid #d3e4fb; border-radius: 7px; background: var(--accent-bg);
  }
  .template-links a:hover { background: #dceafd; }
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="logo">LE</div>
    <div class="nav-item active" data-view="overview">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
      Overview
    </div>
    <div class="nav-item" data-view="rules">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="M8 9h8M8 13h8M8 17h5"/></svg>
      Rules
    </div>
    <div class="nav-item" data-view="evaluate">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 11 3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      Evaluate
    </div>
  </div>

  <div class="subnav" id="subnav" style="display:none;"></div>

  <div class="content">
    <div class="topbar">
      <div>
        <div class="crumb" id="crumb">Leave Eligibility Engine</div>
        <h1 id="pageTitle">Overview</h1>
      </div>
      <div id="topbarActions"></div>
    </div>
    <div class="page" id="page"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this) closeModal()">
  <div class="modal-box" id="modalBox"></div>
</div>

<script>
let RULES = null;
let EXAMPLES = null;
let CHUNKS = null;
let currentView = 'overview';
let currentPack = null; // {jurisdiction, key} for rules view
let evalHistory = JSON.parse(localStorage.getItem('leg_eval_history') || '[]');
let lastResults = []; // most recently rendered Evaluate results, for manual-review lookups
let _checklistRegistry = []; // idx -> {row, jurisdiction}, for the "View rule" popup

const REASON_LABELS = {
  health_condition: 'Health condition',
  birth_or_pregnancy: 'Birth or pregnancy',
  adoption: 'Adoption',
  military_exigency: 'Military exigency',
  military_caregiver: 'Military caregiver',
};

// ---------------------------------------------------------------- bootstrap

async function boot() {
  const [rulesRes, examplesRes, chunksRes] = await Promise.all([
    // Relative paths so SageMaker / Jupyter /proxy/<port>/ prefixes still work.
    fetch('api/rules'), fetch('api/examples'), fetch('api/chunks')
  ]);
  RULES = await rulesRes.json();
  EXAMPLES = await examplesRes.json();
  CHUNKS = await chunksRes.json();
  setupNav();
  renderView('overview');
}

// ---------------------------------------------------------------- source-text lookup + modal

function normReg(s) {
  return String(s || '')
    .replace(/29\s*CFR/gi, '')
    .replace(/[§\s]/g, '')
    .toLowerCase();
}

function matchChunks(jurisdiction, citation) {
  if (!citation || !CHUNKS || !CHUNKS[jurisdiction]) return [];
  const pieces = String(citation).split(/[;,]/).map(normReg).filter(Boolean);
  const matches = [];
  const seen = new Set();
  for (const chunk of CHUNKS[jurisdiction]) {
    const regs = (chunk.regulation_number || []).map(normReg);
    const hit = pieces.some(p => regs.some(r => r && p && (r === p || r.startsWith(p) || p.startsWith(r))));
    if (hit) {
      const key = (chunk.raw_text || '').slice(0, 80);
      if (!seen.has(key)) { seen.add(key); matches.push(chunk); }
    }
  }
  return matches;
}

function renderSourceChunks(jurisdiction, citation) {
  const chunks = matchChunks(jurisdiction, citation);
  if (chunks.length === 0) {
    return `<div class="desc" style="margin:0;">No matching source text found for citation ${escapeHtml(citation || '(none)')}.</div>`;
  }
  return chunks.map(c => `
    <div class="chunk-block">
      <div class="chunk-cite">${escapeHtml((c.regulation_number || []).join(', ') || 'Source')}</div>
      <pre>${escapeHtml(c.raw_text || '')}</pre>
    </div>
  `).join('');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function openModal(html) {
  document.getElementById('modalBox').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

function openRuleModal(jurisdiction, node) {
  const requirement = formatRequirement(node);
  const html = `
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h3>${escapeHtml(node.label || node.name || 'Condition')}</h3>
    <div class="modal-meta">${jurisdiction === 'federal' ? 'Federal' : escapeHtml(jurisdiction)}${node.citation ? ' · ' + escapeHtml(node.citation) : ''}</div>
    ${requirement ? `<div class="desc" style="margin-bottom:4px;">${escapeHtml(requirement)}</div>` : ''}
    <div class="section-title">Source text</div>
    ${renderSourceChunks(jurisdiction, node.citation)}
  `;
  openModal(html);
}

function openRuleModalById(id) {
  const entry = _checklistRegistry[id];
  if (entry) openRuleModal(entry.jurisdiction, entry.row);
}

function setupNav() {
  document.querySelectorAll('.nav-item[data-view]').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      item.classList.add('active');
      renderView(item.dataset.view);
    });
  });
}

function renderView(view) {
  currentView = view;
  if (view === 'overview') renderOverview();
  else if (view === 'rules') renderRulesView();
  else if (view === 'evaluate') renderEvaluateView();
}

// ---------------------------------------------------------------- overview

function renderOverview() {
  document.getElementById('subnav').style.display = 'none';
  document.getElementById('crumb').textContent = 'Leave Eligibility Engine';
  document.getElementById('pageTitle').textContent = 'Overview';
  document.getElementById('topbarActions').innerHTML = `<button class="btn primary" onclick="goEvaluate()">Evaluate a claim</button>`;

  const jCount = Object.keys(RULES).length;
  let packCount = 0;
  for (const j of Object.values(RULES)) {
    packCount += ['ee','notice','cert'].filter(k => j[k]).length;
    packCount += Object.keys(j.leave_reasons || {}).length;
  }

  const recent = evalHistory.slice(0, 6);

  document.getElementById('page').innerHTML = `
    <div class="cards-row">
      <div class="stat-card"><div class="num">${jCount}</div><div class="label">Jurisdictions covered</div></div>
      <div class="stat-card"><div class="num">${packCount}</div><div class="label">Saved rule packs</div></div>
      <div class="stat-card"><div class="num">${evalHistory.length}</div><div class="label">Claims evaluated this session</div></div>
    </div>

    <div class="card highlight">
      <div class="card-head"><h3>How this works</h3></div>
      <div class="desc" style="margin-bottom:0;">
        Eligibility rules for each jurisdiction (employee eligibility, leave-reason pathways, notice, and
        certification) are pre-loaded and saved on the <b>Rules</b> tab. On the <b>Evaluate</b> tab you submit
        one or more claims — fill in a claim's facts in a table, or upload an Excel file of claims — and the
        engine checks every applicable condition, then returns a decision (Approved / Needs human review) with
        the full reasoning and a condition-by-condition breakdown referenced to the underlying rule language
        and citation.
      </div>
    </div>

    <div class="card">
      <div class="card-head"><h3>Recent evaluations</h3></div>
      ${recent.length === 0
        ? `<div class="desc" style="margin-bottom:0;">No claims evaluated yet in this session.</div>`
        : recent.map(r => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-top:1px solid var(--border);">
            <div>
              <div style="font-weight:600;">${r.id}</div>
              <div style="font-size:11.5px;color:var(--text-dim);">${r.jurisdiction} · ${REASON_LABELS[r.leave_reason] || r.leave_reason}</div>

          </div>
        `).join('')}
    </div>
  `;
}

function toggleGroup(j) {
  document.querySelectorAll('.subnav .group').forEach(g => {
    if (g.dataset.j !== j) g.classList.remove('open');
  });
  const el = document.querySelector(`.subnav .group[data-j="${j}"]`);
  el.classList.toggle('open');
}

function selectPack(j, key) {
  currentPack = { jurisdiction: j, key };
  renderRulesView();
}

function renderPackDetail(j, key) {
  const packs = RULES[j];
  let pack, title, citation = '';
  if (key === 'ee') { pack = packs.ee; title = 'Employee eligibility conditions'; }
  else if (key === 'notice') { pack = packs.notice; title = 'Notice requirement'; }
  else if (key === 'cert') { pack = packs.cert; title = 'Certification requirement'; }
  else if (key.startsWith('lr:')) {
    const reason = key.slice(3);
    pack = packs.leave_reasons[reason];
    title = (REASON_LABELS[reason] || reason) + ' — leave-reason pathways';
  }

  if (!pack) {
    document.getElementById('page').innerHTML = `<div class="empty-state">No saved rules for this pack.</div>`;
    return;
  }

  const data = pack.data;
  const conditions = toConditionList(data);
  let relHtml = '';
  if (data && data.included_relationships) {
    relHtml = renderNode(data.included_relationships, 0, j);
  }

  _ruleNodeCounter = 0;
  document.getElementById('page').innerHTML = `
    <div class="card">
      <div class="card-head"><h3>${title}</h3></div>
      <div class="rule-meta">Source: ${pack.path}</div>
      ${relHtml}
      ${conditions.map(c => renderNode(c, 0, j)).join('') || '<div class="desc">No conditions found in this file.</div>'}
    </div>
  `;
}

function toConditionList(pack) {
  if (!pack) return [];
  if (Array.isArray(pack)) return pack;
  if (Array.isArray(pack.conditions)) return pack.conditions;
  if (Array.isArray(pack.employee_eligibility_conditions)) return pack.employee_eligibility_conditions;
  if (pack.field || pack.condition_name) return [pack];
  return [];
}

function isChildGroup(node) {
  const v = node.required_value;
  return Array.isArray(v) && v.length > 0 && v.every(x => x && typeof x === 'object' && !Array.isArray(x));
}

let _ruleNodeCounter = 0;

function sourceToggleButton(nodeId) {
  return `<button class="source-btn" onclick="toggleChunkPanel('${nodeId}')">View source text</button>`;
}

function toggleChunkPanel(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function renderNode(node, depth, jurisdiction) {
  const label = node.label || node.condition_name || node.field || 'condition';
  const op = (node.operator || '==').toUpperCase();
  const nodeId = 'rulenode-' + (_ruleNodeCounter++);
  const chunkPanel = node.citation
    ? `<div class="chunk-panel" id="${nodeId}">${renderSourceChunks(jurisdiction, node.citation)}</div>`
    : '';

  if (isChildGroup(node)) {
    const children = node.required_value.map(c => renderNode(c, depth + 1, jurisdiction)).join('');
    return `
      <div class="rule-node" style="margin-left:${depth * 16}px">
        <div class="rule-node-head">
          <span>${escapeHtml(label)}</span>
          <span class="rule-op">${op === 'ANY_OF' ? 'ANY ONE OF THESE' : 'ALL OF THESE'}</span>
          ${node.citation ? `<span class="rule-cite">${escapeHtml(node.citation)}</span>` : ''}
          ${node.citation ? sourceToggleButton(nodeId) : ''}
        </div>
        ${chunkPanel}
        ${children}
      </div>
    `;
  }
  return `
    <div class="rule-leaf" style="margin-left:${depth * 16}px; flex-direction:column; align-items:stretch;">
      <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;">
        <span class="rule-name">${escapeHtml(label)}</span>
        <span class="rule-expr" style="font-family:inherit;">${escapeHtml(formatRequirement(node))}</span>
        ${node.citation ? `<span class="rule-cite">${escapeHtml(node.citation)}</span>` : ''}
        ${node.citation ? sourceToggleButton(nodeId) : ''}
      </div>
      ${chunkPanel}
    </div>
  `;
}

function formatRequirement(node) {
  const op = (node.operator || '==').toUpperCase();
  const req = node.required_value;
  const unit = node.unit ? ` ${node.unit}` : '';
  switch (op) {
    case '>=': return `Must be at least ${fmtVal(req)}${unit}`;
    case '<=': return `Must be at most ${fmtVal(req)}${unit}`;
    case '>':  return `Must be more than ${fmtVal(req)}${unit}`;
    case '<':  return `Must be less than ${fmtVal(req)}${unit}`;
    case '!=': return `Must not be ${fmtVal(req)}`;
    case 'IN': return `Must be one of: ${fmtVal(req)}`;
    case '==':
      if (req === true) return 'Must apply';
      if (req === false) return 'Must not apply';
      return req === undefined || req === null ? '' : `Must be: ${fmtVal(req)}`;
    default: return '';
  }
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function loadExample() {

  claimMeta.narrative = ex.narrative || '';
  document.getElementById('claimNarrativeInput').value = claimMeta.narrative;
  renderClaimTable();

function coerceValue(v) {
  if (typeof v !== 'string') return v;
  const trimmed = v.trim();
  if (trimmed === '') return '';
  const low = trimmed.toLowerCase();
  if (low === 'true' || low === 'yes') return true;
  if (low === 'false' || low === 'no') return false;
  if (!isNaN(trimmed) && trimmed !== '') return Number(trimmed);
  return trimmed;
}

function handleFiles(e) {
  uploadedFiles = Array.from(e.target.files || []);
  const list = document.getElementById('fileList');
  list.innerHTML = uploadedFiles.map(f => `<div class="f">${escapeHtml(f.name)}</div>`).join('');
}

async function runEvaluation() {
  const errEl = document.getElementById('evalError');
  errEl.style.display = 'none';
  const activeTab = document.querySelector('.tab.active').dataset.tab;

  const btn = document.getElementById('runBtn');
  const status = document.getElementById('runStatus');
  btn.disabled = true;
  status.textContent = 'Evaluating…';

  try {
    let res;
    if (activeTab === 'enter') {
      const jurisdiction = document.getElementById('pJurisdiction').value;
      const leave_reason = document.getElementById('pReason').value;
      if (Object.keys(claimFacts).length === 0) throw new Error('Add at least one fact, or load an example claim, first.');
      const facts = {};
      Object.entries(claimFacts).forEach(([k, v]) => { facts[k] = coerceValue(v); });
      const claim = { jurisdiction, leave_reason, id: claimMeta.id || undefined, narrative: claimMeta.narrative || '', facts };
      res = await fetch('api/evaluate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ claims: [claim] })
      });
    } else {
      if (uploadedFiles.length === 0) throw new Error('Upload at least one .xlsx claim file first.');
      const form = new FormData();
      uploadedFiles.forEach(f => form.append('file', f, f.name));
      res = await fetch('api/evaluate-upload', { method: 'POST', body: form });
    }
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    renderResults(data.results);
    status.textContent = `Evaluated ${data.results.length} claim(s) — ${new Date().toLocaleTimeString()}`;

    evalHistory = data.results.map(r => ({ id: r.id, jurisdiction: r.jurisdiction, leave_reason: r.leave_reason, decision: r.decision }))
      .concat(evalHistory).slice(0, 25);
    localStorage.setItem('leg_eval_history', JSON.stringify(evalHistory));
  } catch (e) {
    errEl.textContent = 'Evaluation failed: ' + e.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
  }
}

function buildReasoning(r) {
  const lines = [];
  lines.push({ cls: '', text: `Evaluated against ${r.tracks_evaluated.length} track${r.tracks_evaluated.length > 1 ? 's' : ''}: ${r.tracks_evaluated.join(', ')}.` });
  for (const t of r.tracks_evaluated) {
    const tr = r.tracks[t];
    if (tr.passed) {
      lines.push({ cls: 'ok', text: `${t} track: all conditions satisfied (employee eligibility, leave-reason pathway, notice, and certification).` });
    } else {
      const failed = Object.entries(tr.parts).filter(([, p]) => p.passed === false).map(([n]) => n.replace(/_/g,' '));
      const pending = Object.entries(tr.parts).filter(([, p]) => p.passed === null).map(([n]) => n.replace(/_/g,' '));
      if (failed.length) lines.push({ cls: 'bad', text: `${t} track: failed — ${failed.join(', ')}.` });
      if (pending.length) lines.push({ cls: 'pending', text: `${t} track: pending — missing facts for ${pending.join(', ')}.` });
      if (!failed.length && !pending.length) lines.push({ cls: 'bad', text: `${t} track: not satisfied.` });
    }
  }
  if (r.decision === 'APPROVED') {
    const passedTrack = r.tracks_evaluated.find(t => r.tracks[t].passed);
    lines.push({ cls: 'ok', text: `Decision: APPROVED — via the ${passedTrack} track.` });
  } else {
    lines.push({ cls: 'bad', text: `Decision: NEED HUMAN REVIEW — no track fully satisfied all conditions.` });
  }
  return lines;
}

function flattenGroups(v) {
  if (!Array.isArray(v)) return [v];
  const out = [];
  for (const x of v) {
    if (Array.isArray(x)) out.push(x.join(' '));
    else out.push(x);
  }
  return out;
}

function fmtVal(v) {
  if (v === true) return 'Yes';
  if (v === false) return 'No';
  if (v === null || v === undefined || v === '') return '—';
  if (Array.isArray(v)) return flattenGroups(v).join(' / ');
  return String(v);
}

function formatBasis(row) {
  if (row.is_group) return '';
  if (row.skipped_reason) return row.skipped_reason;
  const unit = row.unit ? ` ${row.unit}` : '';
  const req = row.required_value;
  const act = row.actual_value;
  const op = (row.operator || '').toUpperCase();
  switch (op) {
    case '>=': return `Required: at least ${req}${unit} — Actual: ${fmtVal(act)}${unit}`;
    case '<=': return `Required: at most ${req}${unit} — Actual: ${fmtVal(act)}${unit}`;
    case '>':  return `Required: more than ${req}${unit} — Actual: ${fmtVal(act)}${unit}`;
    case '<':  return `Required: less than ${req}${unit} — Actual: ${fmtVal(act)}${unit}`;
    case '!=': return `Must not equal ${fmtVal(req)} — Actual: ${fmtVal(act)}`;
    case 'IN': return `Required one of: ${fmtVal(req)} — Actual: ${fmtVal(act)}`;
    case '==': return req === undefined ? `Actual: ${fmtVal(act)}` : `Required: ${fmtVal(req)} — Actual: ${fmtVal(act)}`;
    default: return act !== undefined ? `Actual: ${fmtVal(act)}` : '';
  }
}

function renderChecklist(checklist, jurisdiction) {
  if (!checklist || checklist.length === 0) {
    return `<div class="desc" style="margin:0;">No individual conditions were checked for this part.</div>`;
  }
  return `
    <table class="cond-table">
      <thead><tr><th>Condition</th><th>Citation</th><th>Basis</th><th>Result</th></tr></thead>
      <tbody>
        ${checklist.map(row => {
          const depth = Math.max(0, ((row.path || '').match(/\//g) || []).length - 1);
          const resultBadge = row.passed === true ? '<span class="badge-pass">Pass</span>'
            : row.passed === false ? '<span class="badge-fail">Fail</span>'
            : '<span class="badge-pending">' + (row.skipped_reason ? 'N/A' : 'Pending') + '</span>';
          const extra = row.source_text || row.plain_notes;
          const rid = _checklistRegistry.push({ row, jurisdiction }) - 1;
          const rowClass = row.passed === false ? 'cond-fail-row' : '';
          return `
            <tr class="${rowClass}">
              <td style="padding-left:${8 + depth * 14}px;${row.is_group ? 'font-weight:700;' : ''}">
                <div>${escapeHtml(row.label || row.name || '')}</div>
                ${extra ? `<div style="font-size:10.5px;color:var(--text-dim);font-style:italic;margin-top:2px;max-width:340px;">${escapeHtml(extra)}</div>` : ''}
              </td>
              <td style="white-space:nowrap;color:var(--text-dim);font-size:11.5px;">
                ${row.citation ? escapeHtml(row.citation) : '—'}
                ${row.citation ? `<div style="margin-top:4px;"><button class="source-btn" onclick="openRuleModalById(${rid})">View rule</button></div>` : ''}
              </td>
              <td>${escapeHtml(formatBasis(row))}</td>
              <td class="result">${resultBadge}</td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
  `;
}

function reviewBoxInner(idx) {
  return `
    <div class="review-head">Specialist review</div>
    <div class="review-actions">
      <input type="text" id="review-note-${idx}" placeholder="Optional note" />
      <button class="btn small review-approve" onclick="submitManualDecision(${idx}, 'APPROVED')">Approve claim</button>
      <button class="btn small review-deny" onclick="submitManualDecision(${idx}, 'DENIED')">Deny claim</button>
    </div>
  `;
}

function reopenReview(idx) {
  const box = document.getElementById(`review-${idx}`);
  if (box) box.innerHTML = reviewBoxInner(idx);
}

async function submitManualDecision(idx, decision) {
  const r = lastResults[idx];
  const box = document.getElementById(`review-${idx}`);
  const noteEl = document.getElementById(`review-note-${idx}`);
  const note = noteEl ? noteEl.value.trim() : '';
  box.innerHTML = `<div class="review-head">Specialist review</div><div class="desc" style="margin:0;">Saving…</div>`;
  try {
    const res = await fetch('api/manual-decision', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        claim_id: r.id, jurisdiction: r.jurisdiction, leave_reason: r.leave_reason,
        engine_decision: r.decision, manual_decision: decision, reviewer_note: note,
      }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    const when = new Date(data.record.timestamp).toLocaleString();
    box.innerHTML = `
      <div class="review-head">Specialist review</div>
      <div class="review-result ${decision === 'APPROVED' ? 'ok' : 'bad'}">
        Decision: <b>${decision === 'APPROVED' ? 'Approved' : 'Denied'}</b> by specialist — ${when}
        ${note ? `<div style="margin-top:4px;font-style:italic;">"${escapeHtml(note)}"</div>` : ''}
      </div>
      <button class="btn small" style="margin-top:8px;" onclick="reopenReview(${idx})">Change decision</button>
    `;
  } catch (e) {
    box.innerHTML = `
      <div class="review-head">Specialist review</div>
      <div class="desc" style="margin:0;color:var(--red);">Could not save: ${escapeHtml(e.message)}</div>
      <button class="btn small" style="margin-top:8px;" onclick="reopenReview(${idx})">Try again</button>
    `;
  }
}

function renderResults(results) {
  lastResults = results;
  _checklistRegistry = [];
  const area = document.getElementById('resultsArea');
  area.innerHTML = results.map((r, idx) => {
    const reasoning = buildReasoning(r);
    const needsReview = r.decision !== 'APPROVED';
    const tracksHtml = Object.entries(r.tracks).map(([tname, t]) => {
      const partsHtml = Object.entries(t.parts).map(([pname, p]) => `
        <div class="part-block">
          <div class="part-title">
            <span>${pname.replace(/_/g,' ')}</span>
            <span class="${p.passed === true ? 'badge-pass' : p.passed === false ? 'badge-fail' : 'badge-pending'}">
              ${p.passed === true ? 'Pass' : p.passed === false ? 'Fail' : 'Pending'}
            </span>
          </div>
          ${renderChecklist((p.detail && p.detail.checklist) || [], tname)}
        </div>
      `).join('');
      // Auto-expand tracks that didn't pass, so the specialist sees the
      // failing conditions immediately on a NEED HUMAN REVIEW result.
      const openClass = !t.passed ? 'open' : '';
      return `
        <div class="track ${openClass}" id="track-${idx}-${tname}">
          <div class="track-head" onclick="document.getElementById('track-${idx}-${tname}').classList.toggle('open')">
            <span>${tname} track</span>
            <span class="${t.passed ? 'badge-pass' : 'badge-fail'}">${t.passed ? 'Passed' : 'Not approved'}</span>
          </div>
          <div class="track-body">${partsHtml}</div>
        </div>
      `;
    }).join('');

    return `
      <div class="result-card">
        <div class="result-head">
          <div class="titles">
            <span class="cid">${r.id}</span>
            <span class="cmeta">${r.jurisdiction} · ${REASON_LABELS[r.leave_reason] || r.leave_reason}${r.narrative ? ' — ' + r.narrative : ''}</span>
          </div>
          <span class="pill ${r.decision === 'APPROVED' ? 'approved' : 'review'}">${r.decision === 'APPROVED' ? 'Approved' : 'Needs human review'}</span>
        </div>
        <div class="result-body">
          <ul class="reasoning">
            ${reasoning.map(l => `<li class="${l.cls}">${escapeHtml(l.text)}</li>`).join('')}
          </ul>
          ${tracksHtml}
          ${needsReview ? `<div class="review-box" id="review-${idx}">${reviewBoxInner(idx)}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

boot();
</script>

</body>
</html>
